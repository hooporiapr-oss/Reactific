<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>REACTIFIC VR | Access</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;font-family:Arial,sans-serif;background:radial-gradient(ellipse at center,#020810 0%,#000 80%);color:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden}
.card{text-align:center;padding:40px 32px;width:min(420px,94vw)}
.logo{font-size:2.8rem;font-weight:900;font-style:italic;letter-spacing:.1em;text-transform:uppercase;text-shadow:0 0 40px rgba(0,140,255,.7);margin-bottom:6px}
.logo span{color:#008cff}
.sub{font-size:.7rem;letter-spacing:.25em;text-transform:uppercase;color:#a7adba;margin-bottom:40px}
.label{font-size:.65rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#8892a0;margin-bottom:10px}
.code-input{
  width:100%;height:64px;border-radius:14px;
  border:2px solid rgba(0,140,255,.3);
  background:rgba(0,140,255,.06);
  color:#fff;font-size:2rem;font-weight:900;
  text-align:center;letter-spacing:.3em;text-transform:uppercase;
  outline:none;margin-bottom:16px;
  transition:border-color .2s,box-shadow .2s;
}
.code-input:focus{border-color:#008cff;box-shadow:0 0 0 3px rgba(0,140,255,.2)}
.code-input::placeholder{color:#2a3240;letter-spacing:.1em;font-size:1rem;font-weight:400}
.btn{
  width:100%;height:56px;border:none;border-radius:14px;
  background:linear-gradient(135deg,#008cff,#00b7ff);
  color:#fff;font-size:1.1rem;font-weight:900;
  letter-spacing:.15em;text-transform:uppercase;cursor:pointer;
  box-shadow:0 0 30px rgba(0,140,255,.5);
  transition:opacity .2s,transform .1s;
}
.btn:hover{opacity:.9}
.btn:active{transform:scale(.98)}
.error{color:#FF1493;font-size:.82rem;margin-top:10px;min-height:20px;letter-spacing:.05em}
.footer{position:fixed;bottom:16px;font-size:.45rem;color:#2a3240;letter-spacing:.12em;text-transform:uppercase}
.footer span{color:#008cff}
</style>
</head>
<body>

<div class="card">
  <div class="logo">REACTIFIC<span>™</span></div>
  <div class="sub">Gostar Digital · VR Cognitive Training</div>
  <div class="label">Enter Access Code</div>
  <input class="code-input" id="codeInput" type="password" maxlength="12" placeholder="••••••" autocomplete="off">
  <button class="btn" onclick="checkCode()">ENTER THE COURT →</button>
  <div class="error" id="errorMsg"></div>
</div>

<div class="footer">REACTIFIC™ · <span>Virtual Reaction Reality</span> · Gostar Digital LLC</div>

<script>
// ── ACCESS CODE — CHANGE THIS TO UPDATE ──
var ACCESS_CODE = 'GOSTAR25';
// ─────────────────────────────────────────

var STORAGE_KEY = 'rct-access';
var DEST = '/vr-home.html';

// Auto-pass if already authenticated
if(localStorage.getItem(STORAGE_KEY) === ACCESS_CODE){
  window.location.replace(DEST);
}

function checkCode(){
  var val = document.getElementById('codeInput').value.trim().toUpperCase();
  if(val === ACCESS_CODE){
    localStorage.setItem(STORAGE_KEY, ACCESS_CODE);
    window.location.replace(DEST);
  }else{
    document.getElementById('errorMsg').textContent = 'Incorrect code — try again';
    document.getElementById('codeInput').value = '';
    document.getElementById('codeInput').focus();
    setTimeout(function(){document.getElementById('errorMsg').textContent=''},2500);
  }
}

// Enter key support
document.getElementById('codeInput').addEventListener('keydown',function(e){
  if(e.key==='Enter')checkCode();
});

document.getElementById('codeInput').focus();
</script>
</body>
</html>
