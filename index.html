<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>REACTIFIC VR | Access</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;overflow:hidden;
  font-family:Arial,sans-serif;color:#fff;
  background:radial-gradient(ellipse at 20% 20%,rgba(0,140,255,.18),transparent 40%),
             radial-gradient(ellipse at 80% 80%,rgba(155,89,182,.15),transparent 40%),
             linear-gradient(180deg,#020810,#010205);
  user-select:none;-webkit-user-select:none;
}
body::before{
  content:'';position:fixed;bottom:0;left:0;right:0;height:35%;
  background:
    repeating-linear-gradient(90deg,rgba(0,140,255,.07) 0,rgba(0,140,255,.07) 1px,transparent 1px,transparent 50px),
    repeating-linear-gradient(0deg,rgba(0,140,255,.07) 0,rgba(0,140,255,.07) 1px,transparent 1px,transparent 50px);
  transform:perspective(300px) rotateX(60deg);
  transform-origin:bottom center;
  pointer-events:none;
}
.wrap{
  position:relative;width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;
}
.vr-badge{display:inline-block;background:rgba(0,140,255,.15);border:1px solid rgba(0,140,255,.4);border-radius:999px;padding:4px 16px;font-size:.6rem;font-weight:900;letter-spacing:.2em;text-transform:uppercase;color:#008cff;margin-bottom:14px}
.vr-logo{font-size:2.6rem;font-weight:900;font-style:italic;letter-spacing:.1em;text-transform:uppercase;line-height:1;text-shadow:0 0 40px rgba(0,140,255,.6);text-align:center}
.vr-logo span{color:#008cff}
.vr-sub{font-size:.62rem;letter-spacing:.25em;text-transform:uppercase;color:#a7adba;margin-top:8px;margin-bottom:40px;text-align:center}

.gate-box{width:100%;max-width:340px;display:flex;flex-direction:column;align-items:center}
.gate-label{font-size:.65rem;font-weight:900;letter-spacing:.2em;text-transform:uppercase;color:#8892a0;margin-bottom:12px;text-align:center}
.gate-input{
  width:100%;height:58px;border-radius:14px;
  border:2px solid rgba(0,140,255,.4);background:rgba(0,140,255,.06);
  color:#fff;font-size:1.3rem;font-weight:900;letter-spacing:.15em;text-transform:uppercase;
  text-align:center;outline:none;transition:border-color .2s,box-shadow .2s;
  margin-bottom:16px;
}
.gate-input:focus{border-color:#008cff;box-shadow:0 0 24px rgba(0,140,255,.4)}
.gate-input::placeholder{color:rgba(255,255,255,.25);letter-spacing:.1em;font-weight:700}

.gate-btn{
  width:100%;height:58px;border:none;border-radius:14px;
  background:linear-gradient(135deg,#008cff,#40b0ff);color:#fff;
  font-size:1rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase;
  cursor:pointer;box-shadow:0 0 30px rgba(0,140,255,.5);
  transition:transform .15s;
}
.gate-btn:active{transform:scale(.97)}

.gate-error{
  font-size:.7rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:#ff4d6d;margin-top:14px;text-align:center;min-height:14px;
}

.footer{position:absolute;bottom:18px;left:0;right:0;text-align:center;font-size:.46rem;color:#2a3240;letter-spacing:.12em;text-transform:uppercase}
.footer span{color:#008cff}

@media (max-width:420px){
  .vr-logo{font-size:2rem}
  .vr-sub{font-size:.55rem;margin-bottom:32px}
  .gate-box{max-width:300px}
}
</style>
</head>
<body>
<div class="wrap">

  <div class="vr-badge">🥽 Virtual Reaction Reality™</div>
  <div class="vr-logo">REACTIFIC<span>™</span></div>
  <div class="vr-sub">Pico VR · Gostar Digital™</div>

  <div class="gate-box">
    <div class="gate-label">Enter Access Code</div>
    <input type="text" class="gate-input" id="codeInput" placeholder="••••••••" autocomplete="off" autocapitalize="off" spellcheck="false">
    <button class="gate-btn" id="enterBtn">Enter VR Lab</button>
    <div class="gate-error" id="errMsg"></div>
  </div>

  <div class="footer">REACTIFIC™ · <span>Virtual Reaction Reality</span> · Gostar Digital LLC</div>

</div>

<script>
var ACCESS_CODE = 'Paradiso';
var input = document.getElementById('codeInput');
var btn = document.getElementById('enterBtn');
var err = document.getElementById('errMsg');

function tryEnter(){
  var entered = input.value.trim();
  if(entered.toLowerCase() === ACCESS_CODE.toLowerCase()){
    sessionStorage.setItem('rct-gate-pass','1');
    window.location.href = '/vr-home.html';
  }else{
    err.textContent = 'Incorrect code — try again';
    input.value = '';
    input.focus();
  }
}

btn.onclick = tryEnter;
input.addEventListener('keydown', function(e){
  if(e.key === 'Enter') tryEnter();
});
input.focus();
</script>
</body>
</html>
