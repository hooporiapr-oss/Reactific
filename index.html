<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>REACTIFIC Access</title>
<style>body{margin:0;padding:0;background:#0a0e1a;color:#fff;font-family:Arial,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}.w{text-align:center;padding:20px}.l{font-size:2.2rem;font-weight:900;margin:20px 0}.i{width:100%;max-width:300px;height:50px;padding:10px;margin:20px 0;background:#111;border:2px solid #008cff;border-radius:8px;color:#fff;font-size:1rem;text-align:center;outline:0}.b{width:100%;max-width:300px;height:50px;margin:10px 0;background:#008cff;border:none;border-radius:8px;color:#000;font-size:1rem;font-weight:900;cursor:pointer}.b:active{opacity:.9}.e{color:#f00;margin-top:10px;font-size:.8rem;min-height:20px}</style>
</head>
<body>
<div class="w">
<div class="l">REACTIFIC™</div>
<input type="text" class="i" id="c" placeholder="Code" autocomplete="off">
<button class="b" onclick="go()">ENTER</button>
<div class="e" id="e"></div>
</div>
<script>
function go(){var x=document.getElementById('c').value.trim();if(x.toLowerCase()==='paradiso'){sessionStorage.setItem('rct-gate-pass','1');window.location.href='/vr-home.html'}else{document.getElementById('e').textContent='Wrong code';document.getElementById('c').value='';document.getElementById('c').focus()}}
document.getElementById('c').addEventListener('keypress',function(e){if(e.key==='Enter')go()});
document.getElementById('c').focus();
</script>
</body>
</html>
