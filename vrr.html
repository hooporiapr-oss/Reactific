<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Virtual Reaction Reality™ | REACTIFIC™</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:Arial,sans-serif}
#c{display:block;width:100%;height:100%}
#ui{
  position:fixed;top:0;left:0;width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center,rgba(155,89,182,.18),#000 70%);
  z-index:10;
}
.logo{
  font-size:clamp(1.4rem,5vw,3.2rem);font-weight:900;font-style:italic;
  letter-spacing:.12em;text-transform:uppercase;color:#fff;
  text-shadow:0 0 40px rgba(155,89,182,.9),0 0 80px rgba(155,89,182,.4);
  margin-bottom:6px;
}
.logo span{color:#9B59B6}
.tagline{color:#8892a0;font-size:clamp(.7rem,2vw,1rem);letter-spacing:.2em;text-transform:uppercase;margin-bottom:40px}
.start-btn{
  padding:18px 48px;border:none;border-radius:999px;
  background:linear-gradient(135deg,#9B59B6,#A873B8);
  color:#fff;font-size:clamp(1rem,3vw,1.4rem);font-weight:900;
  letter-spacing:.16em;text-transform:uppercase;cursor:pointer;
  box-shadow:0 0 40px rgba(155,89,182,.6);
  margin-bottom:20px;
}
.hint{color:#8892a0;font-size:.75rem;letter-spacing:.1em;text-align:center;line-height:1.6}
#hud{
  position:fixed;top:0;left:0;width:100%;
  display:none;justify-content:space-between;align-items:center;
  padding:14px 24px;z-index:10;pointer-events:none;
  background:linear-gradient(180deg,rgba(0,0,0,.7),transparent);
}
#hud.show{display:flex}
.hud-item{text-align:center}
.hud-val{font-size:clamp(1.4rem,4vw,2.2rem);font-weight:900;color:#9B59B6;line-height:1}
.hud-lbl{font-size:.6rem;color:#8892a0;text-transform:uppercase;letter-spacing:.12em}
#msg{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:clamp(1.2rem,5vw,2.5rem);font-weight:900;letter-spacing:.16em;
  text-transform:uppercase;color:#fff;text-align:center;
  pointer-events:none;z-index:10;display:none;
  text-shadow:0 0 30px rgba(155,89,182,.8);
}
#lives{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);font-size:1.6rem;z-index:10;display:none;letter-spacing:8px}
#xr-btn{
  position:fixed;bottom:20px;right:20px;
  padding:12px 22px;border:2px solid #9B59B6;background:rgba(155,89,182,.15);
  color:#9B59B6;font-weight:900;font-size:.8rem;letter-spacing:.12em;
  border-radius:999px;cursor:pointer;z-index:20;display:none;
}
#progress{
  position:fixed;bottom:60px;left:50%;transform:translateX(-50%);
  display:none;align-items:center;gap:12px;z-index:10;
}
#progress.show{display:flex}
.p-star{font-size:1.2rem;opacity:.2;transition:opacity .3s,filter .3s}
.p-star.earned{opacity:1;filter:drop-shadow(0 0 6px #9B59B6)}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">
  <div class="logo">VIRTUAL REACTION<span> REALITY</span>™</div>
  <div class="tagline">Powered by Reactific™ · Pico Goblin 2</div>
  <button class="start-btn" id="startBtn">▶ ENTER THE COURT</button>
  <div class="hint">
    Pico Goblin 2: Press trigger to tap lit cells<br>
    Desktop: Click cells · Mobile: Tap cells
  </div>
</div>

<div id="hud">
  <div class="hud-item"><div class="hud-val" id="hLv">1</div><div class="hud-lbl">Level</div></div>
  <div class="hud-item"><div class="hud-val" id="hSc">0</div><div class="hud-lbl">Score</div></div>
  <div class="hud-item"><div class="hud-val" id="hRd">0</div><div class="hud-lbl">Round</div></div>
  <div class="hud-item"><div class="hud-val" id="hSt">0</div><div class="hud-lbl">🔥</div></div>
</div>

<div id="msg"></div>
<div id="lives"></div>
<div id="progress" class="show">
  <span class="p-star" id="ps1">⭐</span>
  <span class="p-star" id="ps2">⭐</span>
  <span class="p-star" id="ps3">⭐</span>
</div>
<button id="xr-btn">🥽 VR MODE</button>

<script>
(function(){
/* ── THREE.JS SCENE ── */
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x05020a);
scene.fog = new THREE.Fog(0x05020a, 8, 30);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0, 1.6, 3.5);

/* ── LIGHTING ── */
scene.add(new THREE.AmbientLight(0x9B59B6, 0.4));
const spot = new THREE.SpotLight(0xffffff, 1.2);
spot.position.set(0, 8, 2);
spot.angle = Math.PI/4;
scene.add(spot);
const fill = new THREE.PointLight(0x9B59B6, 1.5, 12);
fill.position.set(0, 2, -2);
scene.add(fill);

/* ── COURT FLOOR ── */
const floorGeo = new THREE.PlaneGeometry(10,10);
const floorMat = new THREE.MeshStandardMaterial({color:0x0a0a0f,roughness:.9,metalness:.1});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// Grid lines on floor
const gridHelper = new THREE.GridHelper(10,10,0x9B59B6,0x1a0a2e);
scene.add(gridHelper);

/* ── AMBIENT PARTICLES ── */
const partGeo = new THREE.BufferGeometry();
const partCount = 200;
const positions = new Float32Array(partCount*3);
for(let i=0;i<partCount*3;i++) positions[i] = (Math.random()-0.5)*20;
partGeo.setAttribute('position', new THREE.BufferAttribute(positions,3));
const partMat = new THREE.PointsMaterial({color:0x9B59B6, size:0.04, transparent:true, opacity:0.6});
const particles = new THREE.Points(partGeo, partMat);
scene.add(particles);

/* ── GRID OF CELLS ── */
const COLS = 5, ROWS = 5, TOTAL = 25;
const cellW = 0.7, cellH = 0.7, cellD = 0.12;
const gapX = 0.12, gapY = 0.12;
const startX = -((COLS-1)*(cellW+gapX))/2;
const startY = 0.6;
const gridZ = -1.2;

const cellMeshes = [];
const cellMat_idle = new THREE.MeshStandardMaterial({color:0x111118, roughness:.4, metalness:.3, transparent:true, opacity:.85});
const cellMat_target = new THREE.MeshStandardMaterial({color:0x9B59B6, emissive:0x9B59B6, emissiveIntensity:.8, roughness:.2, metalness:.5});
const cellMat_correct = new THREE.MeshStandardMaterial({color:0x00D9A5, emissive:0x00D9A5, emissiveIntensity:.6, roughness:.2, metalness:.4});
const cellMat_miss = new THREE.MeshStandardMaterial({color:0xFF1493, emissive:0xFF1493, emissiveIntensity:.5, roughness:.3});

const cellGeo = new THREE.BoxGeometry(cellW, cellH, cellD);
const cellGroup = new THREE.Group();
cellGroup.position.set(0, 0, gridZ);
scene.add(cellGroup);

for(let r=0;r<ROWS;r++){
  for(let c=0;c<COLS;c++){
    const mesh = new THREE.Mesh(cellGeo, cellMat_idle.clone());
    mesh.position.set(
      startX + c*(cellW+gapX),
      startY + (ROWS-1-r)*(cellH+gapY),
      0
    );
    mesh.userData.index = r*COLS+c;
    mesh.userData.state = 'idle';
    cellGroup.add(mesh);
    cellMeshes.push(mesh);
  }
}

/* ── TITLE BOARD (floating text via sprite) ── */
function makeLabel(text, size){
  const canvas2 = document.createElement('canvas');
  canvas2.width = 512; canvas2.height = 128;
  const ctx = canvas2.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0)';
  ctx.fillRect(0,0,512,128);
  ctx.fillStyle = '#9B59B6';
  ctx.font = `900 ${size}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 256, 64);
  const tex = new THREE.CanvasTexture(canvas2);
  const mat = new THREE.SpriteMaterial({map:tex, transparent:true});
  const sprite = new THREE.Sprite(mat);
  return sprite;
}
const titleSprite = makeLabel('VIRTUAL REACTION REALITY™', 36);
titleSprite.scale.set(5, 1.25, 1);
titleSprite.position.set(0, 3.2, gridZ);
scene.add(titleSprite);

const subSprite = makeLabel('REACTIFIC™', 28);
subSprite.scale.set(2, 0.5, 1);
subSprite.position.set(0, 2.75, gridZ);
scene.add(subSprite);

/* ── RAYCASTER (mouse/touch/controller) ── */
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function getIntersects(x, y){
  mouse.x = (x/window.innerWidth)*2-1;
  mouse.y = -(y/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  return raycaster.intersectObjects(cellMeshes);
}

canvas.addEventListener('click', e=>{
  const hits = getIntersects(e.clientX, e.clientY);
  if(hits.length) handleTap(hits[0].object.userData.index);
});
canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  const t = e.touches[0];
  const hits = getIntersects(t.clientX, t.clientY);
  if(hits.length) handleTap(hits[0].object.userData.index);
},{passive:false});

/* ── GAME STATE ── */
const g = {level:1, score:0, streak:0, perfects:0, round:0, lives:3};
const MAX_LIVES=3, PW=350, GW=700;
function gcc(lv){return lv+2}
function getIV(){return 1200}

let phase='idle', pattern=[], beatIndex=-1, currentTarget=-1, startTime=0, tapCount=0, tapResults=[];
let timers=[], missTimer=null;

function clearTimers(){timers.forEach(clearTimeout);timers=[];if(missTimer){clearTimeout(missTimer);missTimer=null}}

function cellState(idx, state){
  const m = cellMeshes[idx];
  m.userData.state = state;
  if(state==='idle') m.material = cellMat_idle.clone();
  else if(state==='target'){ m.material = cellMat_target.clone(); m.material.emissiveIntensity=.8; }
  else if(state==='correct') m.material = cellMat_correct.clone();
  else if(state==='miss') m.material = cellMat_miss.clone();
}

function resetCells(){cellMeshes.forEach((_,i)=>cellState(i,'idle'))}

function showMsg(text, dur){
  const el = document.getElementById('msg');
  el.textContent = text;
  el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(()=>el.style.display='none', dur||1200);
}

function updateHUD(){
  document.getElementById('hLv').textContent = g.level;
  document.getElementById('hSc').textContent = g.score;
  document.getElementById('hRd').textContent = g.round;
  document.getElementById('hSt').textContent = g.streak;
  let h='';for(let i=0;i<MAX_LIVES;i++) h+=i<g.lives?'♥':'♡';
  document.getElementById('lives').textContent = h;
  for(let i=1;i<=3;i++){
    const s = document.getElementById('ps'+i);
    s.className = 'p-star'+(g.perfects>=i?' earned':'');
  }
}

function makePattern(){
  const len=gcc(g.level), arr=[];
  while(arr.length<len){const n=Math.floor(Math.random()*TOTAL);if(arr.indexOf(n)===-1)arr.push(n)}
  return arr;
}

function startRound(){
  if(phase!=='idle')return;
  phase='playing';
  g.round++;g.lives=MAX_LIVES;tapCount=0;tapResults=[];
  pattern=makePattern();beatIndex=-1;currentTarget=-1;
  resetCells();updateHUD();
  showMsg('GET READY...',800);
  timers.push(setTimeout(()=>{showMsg('⚡ REACT!',500);timers.push(setTimeout(()=>fireBeat(0),400))},800));
}

function fireBeat(i){
  if(phase!=='playing')return;
  clearTimers();
  beatIndex=i; currentTarget=pattern[i]; startTime=performance.now();
  cellMeshes.forEach((_,j)=>{if(cellMeshes[j].userData.state==='target')cellState(j,'idle')});
  cellState(currentTarget,'target');
  pulseCell(currentTarget);
  const iv=getIV();
  timers.push(setTimeout(()=>{if(cellMeshes[currentTarget].userData.state==='target')cellState(currentTarget,'idle')},iv*.55));
  missTimer=setTimeout(()=>{
    if(phase==='playing'&&currentTarget===pattern[i]){
      g.lives--;tapResults.push('miss');tapCount++;
      cellState(currentTarget,'miss');updateHUD();
      if(g.lives<=0){endRound(false,'OUT OF LIVES')}
      else{showMsg('💨 KEEP GOING!',600);nextBeat(i)}
    }
  },iv*.9);
}

function nextBeat(i){
  if(phase!=='playing')return;
  if(i<pattern.length-1){timers.push(setTimeout(()=>fireBeat(i+1),180))}
  else{timers.push(setTimeout(()=>endRound(true),300))}
}

function handleTap(idx){
  if(phase!=='playing'||currentTarget<0)return;
  if(missTimer){clearTimeout(missTimer);missTimer=null}
  const delta=performance.now()-startTime;
  if(idx!==currentTarget){
    g.lives--;tapResults.push('miss');tapCount++;
    cellState(idx,'miss');updateHUD();
    if(g.lives<=0){endRound(false,'OUT OF LIVES')}
    else{showMsg('❌ WRONG!',600);nextBeat(beatIndex)}
    return;
  }
  let pts=delta<=PW?20:delta<=GW?12:5;
  cellState(idx,delta<=PW?'correct':'correct');
  tapResults.push(delta<=PW?'perfect':'good');
  tapCount++;g.score+=pts;updateHUD();
  showMsg(delta<=PW?'✨ SWISH!':'👍 BUCKET!',500);
  nextBeat(beatIndex);
}

function endRound(won, reason){
  if(phase==='idle')return;
  phase='idle';clearTimers();currentTarget=-1;
  if(won){
    g.perfects++;g.streak++;updateHUD();
    showMsg(g.perfects>=3?'🔥 LEVEL UP!':'🔥 LOCKED IN!',1200);
    if(g.perfects>=3){
      timers.push(setTimeout(()=>{
        if(g.level<23){g.level++;g.perfects=0;}
        updateHUD();resetCells();
        timers.push(setTimeout(startRound,1000));
      },1200));
    }else{timers.push(setTimeout(()=>{resetCells();startRound()},1300));}
  }else{
    g.streak=0;g.perfects=0;updateHUD();
    showMsg(reason||'OUT OF LIVES',1400);
    timers.push(setTimeout(()=>{resetCells();startRound()},1600));
  }
}

/* ── CELL PULSE ANIMATION ── */
const pulseMap = {};
function pulseCell(idx){
  const m = cellMeshes[idx];
  let t=0;
  function step(){
    if(m.userData.state!=='target')return;
    t+=0.08;
    const s=1+Math.sin(t)*0.06;
    m.scale.set(s,s,s);
    if(m.userData.state==='target')requestAnimationFrame(step);
    else m.scale.set(1,1,1);
  }
  step();
}

/* ── CAMERA FLOAT ── */
let camT=0;
function animateCamera(){
  camT+=0.004;
  if(phase==='idle'){
    camera.position.x = Math.sin(camT*0.5)*0.3;
    camera.position.y = 1.6 + Math.sin(camT)*0.05;
  }
  camera.lookAt(0, 1.8, gridZ);
}

/* ── START BUTTON ── */
document.getElementById('startBtn').onclick = function(){
  document.getElementById('ui').style.display='none';
  document.getElementById('hud').classList.add('show');
  document.getElementById('lives').style.display='block';
  document.getElementById('progress').classList.add('show');
  updateHUD();
  startRound();
};

/* ── WEBXR VR BUTTON ── */
if(navigator.xr){
  navigator.xr.isSessionSupported('immersive-vr').then(supported=>{
    if(supported){
      const xrBtn = document.getElementById('xr-btn');
      xrBtn.style.display='block';
      xrBtn.onclick = async function(){
        try{
          const session = await navigator.xr.requestSession('immersive-vr',{
            optionalFeatures:['local-floor','bounded-floor']
          });
          renderer.xr.setSession(session);
          renderer.xr.setReferenceSpaceType('local-floor');
          // In VR: gaze-based selection via controller raycaster
          session.addEventListener('selectstart', ()=>{
            const xrCamera = renderer.xr.getCamera(camera);
            raycaster.setFromCamera({x:0,y:0}, xrCamera);
            const hits = raycaster.intersectObjects(cellMeshes);
            if(hits.length) handleTap(hits[0].object.userData.index);
          });
        }catch(e){console.warn('XR error:',e)}
      };
    }
  });
}

/* ── RENDER LOOP ── */
function animate(){
  particles.rotation.y += 0.001;
  particles.rotation.x += 0.0003;
  animateCamera();
  renderer.render(scene, camera);
}
renderer.setAnimationLoop(animate);

window.addEventListener('resize',()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

})();
</script>
</body>
</html>
