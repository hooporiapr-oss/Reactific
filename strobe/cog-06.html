<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Strobe Reactific™</title>
<style>
:root{--black:#030303;--white:#f2f2f2;--muted:#8d8d98;--line:rgba(255,255,255,.12);--lime:#39FF14;--orange:#f28a1f;--cyan:#00bbf0;--red:#ff3b3b;--gold:#FFD700}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:var(--black);color:var(--white);font-family:Arial,Helvetica,sans-serif;user-select:none;touch-action:manipulation}
body{background:radial-gradient(circle at 10% 12%,rgba(57,255,20,.14),transparent 28%),radial-gradient(circle at 90% 12%,rgba(0,187,240,.12),transparent 28%),linear-gradient(180deg,#050505,#020202)}
.app{width:100vw;height:100vh;padding:24px;display:grid;grid-template-rows:auto auto 1fr auto;gap:18px}
.top{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:16px}
.logo{font-weight:900;letter-spacing:.12em;text-transform:uppercase;font-size:clamp(1.4rem,3.4vw,3.5rem)}
.logo span{color:var(--lime)}
.mode{justify-self:center;border:1px solid rgba(57,255,20,.35);background:rgba(57,255,20,.08);color:var(--lime);border-radius:999px;padding:10px 20px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;font-size:clamp(.7rem,1.2vw,1rem)}
.clock{justify-self:end;display:flex;align-items:center;gap:14px;border:1px solid rgba(255,59,59,.35);background:rgba(255,59,59,.08);border-radius:18px;padding:10px 18px}
.clock-label{color:var(--muted);font-weight:900;letter-spacing:.12em;text-transform:uppercase;font-size:clamp(.6rem,1vw,.85rem)}
.clock-num{color:var(--red);font-weight:900;font-size:clamp(2rem,4.5vw,4.8rem);line-height:1;text-shadow:0 0 22px rgba(255,59,59,.55)}
.mission{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:18px}
.targetbox{justify-self:center;display:flex;align-items:center;gap:18px;border:1px solid rgba(255,215,0,.25);background:rgba(255,215,0,.055);border-radius:22px;padding:14px 22px}
.target-label{color:var(--gold);font-weight:900;letter-spacing:.16em;text-transform:uppercase;font-size:clamp(.75rem,1.4vw,1.2rem)}
.target-num{min-width:clamp(80px,8vw,140px);text-align:center;color:var(--lime);font-size:clamp(2.2rem,5vw,5.5rem);font-weight:900;line-height:1;text-shadow:0 0 24px rgba(57,255,20,.55)}
.stat{color:var(--muted);font-weight:900;letter-spacing:.1em;text-transform:uppercase;font-size:clamp(.7rem,1.15vw,.95rem)}
.stat b{color:var(--lime)}.right{text-align:right}
.court-wrap{display:flex;align-items:center;justify-content:center;min-height:0}
.court{position:relative;width:min(82vh,82vw);max-width:760px;aspect-ratio:1;display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(5,1fr);gap:clamp(8px,1vw,14px);padding:clamp(12px,1.6vw,22px);background:rgba(255,255,255,.045);border:2px solid var(--line);border-radius:28px;box-shadow:0 0 60px rgba(0,0,0,.55);transition:filter .08s linear,opacity .08s linear}
.court.strobe-dim{filter:brightness(.42) contrast(1.1)}
.court.strobe-hard{opacity:.16}
.cell{border:2px solid rgba(255,255,255,.14);border-radius:18px;background:rgba(255,255,255,.065);color:rgba(255,255,255,.76);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:clamp(2.2rem,5vw,5rem);cursor:pointer;transition:transform .09s ease,background .12s ease,border-color .12s ease}
.cell:active{transform:scale(.94)}
.cell.target-hit{background:var(--lime);border-color:var(--lime);color:#001400;box-shadow:0 0 30px rgba(57,255,20,.75)}
.cell.wrong{background:rgba(255,59,59,.38);border-color:var(--red);color:#fff}
.bottom{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:18px}
.controls{display:flex;gap:10px;justify-content:center;align-items:center}
.btn{border:none;border-radius:999px;padding:14px 26px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;font-size:clamp(.8rem,1.2vw,1.1rem);cursor:pointer}
.start{background:linear-gradient(135deg,var(--lime),#2bc10f);color:#001400;box-shadow:0 0 30px rgba(57,255,20,.3)}
.secondary{background:rgba(255,255,255,.08);color:var(--white);border:1px solid var(--line)}
.strobe-controls{justify-self:end;display:flex;gap:8px;align-items:center}
.strobe-pill{border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--muted);border-radius:999px;padding:10px 14px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;font-size:clamp(.6rem,1vw,.8rem)}
.strobe-pill.active{background:rgba(57,255,20,.13);border-color:var(--lime);color:var(--lime)}
.notice{position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(40px);opacity:0;background:linear-gradient(135deg,var(--lime),#2bc10f);color:#001400;border-radius:18px;padding:12px 22px;font-weight:900;transition:all .25s ease;z-index:5}
.notice.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:850px){html,body{overflow:auto}.app{height:auto;min-height:100vh}.top,.mission,.bottom{grid-template-columns:1fr;text-align:center}.mode,.clock,.targetbox,.strobe-controls{justify-self:center}.court{width:92vw}}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="logo">STROBE <span>REACTIFIC™</span></div>
    <div class="mode">Soft Strobe Mode</div>
    <div class="clock"><div class="clock-label">Shot Clock</div><div class="clock-num" id="clock">05</div></div>
  </div>
  <div class="mission">
    <div class="stat">Score: <b id="score">0</b></div>
    <div class="targetbox"><div class="target-label">Find</div><div class="target-num" id="target">—</div></div>
    <div class="stat right">Round: <b id="round">0</b></div>
  </div>
  <div class="court-wrap"><div class="court" id="court"></div></div>
  <div class="bottom">
    <div class="stat">5×5 Court · 25 Zones</div>
    <div class="controls"><button class="btn start" id="startBtn">Start Round</button><button class="btn secondary" id="fullBtn">Fullscreen</button></div>
    <div class="strobe-controls">
      <button class="strobe-pill active" data-mode="soft">Soft</button>
      <button class="strobe-pill" data-mode="medium">Medium</button>
      <button class="strobe-pill" data-mode="hard">Hard</button>
      <button class="strobe-pill" data-mode="off">Off</button>
    </div>
  </div>
</div>
<div class="notice" id="notice">Nice!</div>
<script>
(function(){
  var court=document.getElementById('court'),startBtn=document.getElementById('startBtn'),fullBtn=document.getElementById('fullBtn');
  var targetEl=document.getElementById('target'),clockEl=document.getElementById('clock'),scoreEl=document.getElementById('score'),roundEl=document.getElementById('round'),notice=document.getElementById('notice');
  var cells=[],targetNum=null,score=0,round=0,playing=false,timeLeft=5,timer=null,strobeTimer=null,strobeMode='soft';
  function shuffle(arr){for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=arr[i];arr[i]=arr[j];arr[j]=tmp}return arr}
  function buildCourt(){court.innerHTML='';cells=[];var nums=[];for(var i=1;i<=25;i++)nums.push(i);shuffle(nums);nums.forEach(function(n){var cell=document.createElement('div');cell.className='cell';cell.textContent=n;cell.dataset.num=n;cell.onclick=function(){tapCell(cell)};court.appendChild(cell);cells.push(cell)})}
  function showNotice(msg){notice.textContent=msg;notice.classList.add('show');setTimeout(function(){notice.classList.remove('show')},900)}
  function setStrobeMode(mode){strobeMode=mode;document.querySelectorAll('.strobe-pill').forEach(function(b){b.classList.toggle('active',b.dataset.mode===mode)});if(playing)startStrobe()}
  function startStrobe(){stopStrobe();court.classList.remove('strobe-dim','strobe-hard');if(strobeMode==='off')return;var pace=370;if(strobeMode==='medium')pace=300;if(strobeMode==='hard')pace=220;strobeTimer=setInterval(function(){if(strobeMode==='hard')court.classList.toggle('strobe-hard');else court.classList.toggle('strobe-dim')},pace)}
  function stopStrobe(){if(strobeTimer)clearInterval(strobeTimer);strobeTimer=null;court.classList.remove('strobe-dim','strobe-hard')}
  function startRound(){if(playing)return;playing=true;round++;roundEl.textContent=round;buildCourt();targetNum=Math.floor(Math.random()*25)+1;targetEl.textContent=targetNum;timeLeft=5;clockEl.textContent='05';startBtn.disabled=true;startBtn.textContent='Playing';startStrobe();timer=setInterval(function(){timeLeft--;clockEl.textContent=String(timeLeft).padStart(2,'0');if(timeLeft<=0)failRound('time')},1000)}
  function endRound(){playing=false;startBtn.disabled=false;startBtn.textContent='Start Round';clearInterval(timer);timer=null;stopStrobe()}
  function success(cell){cell.classList.add('target-hit');score+=10+(timeLeft*2);scoreEl.textContent=score;showNotice('Located!');endRound()}
  function failRound(type){showNotice(type==='wrong'?'Wrong Tap':'Time');cells.forEach(function(c){if(Number(c.dataset.num)===targetNum)c.classList.add('target-hit')});endRound()}
  function tapCell(cell){if(!playing)return;var n=Number(cell.dataset.num);if(n===targetNum)success(cell);else{cell.classList.add('wrong');failRound('wrong')}}
  document.querySelectorAll('.strobe-pill').forEach(function(b){b.onclick=function(){setStrobeMode(b.dataset.mode)}});
  startBtn.onclick=startRound;
  fullBtn.onclick=function(){var el=document.documentElement;if(el.requestFullscreen)el.requestFullscreen().catch(function(){});else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen()};
  buildCourt();
})();
</script>
</body>
</html>
