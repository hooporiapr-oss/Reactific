<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>VR Reaction Control | REACTIFIC™</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;font-family:Arial,sans-serif;color:#fff;overflow:hidden;user-select:none;-webkit-user-select:none}
.screen{display:none;width:100%;min-height:100vh;flex-direction:column;align-items:center;justify-content:center}
.screen.active{display:flex}

#screen-intro{background:radial-gradient(ellipse at center,#0e0018 0%,#000 70%);position:relative}
.back-home{position:absolute;top:16px;left:16px;padding:10px 20px;border:2px solid rgba(255,255,255,.25);background:rgba(0,0,0,.5);color:#fff;font-size:.85rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase;border-radius:999px;cursor:pointer;text-decoration:none}
.vrr-logo{font-size:2.4rem;font-weight:900;font-style:italic;letter-spacing:.1em;text-transform:uppercase;text-align:center;line-height:1;color:#fff;animation:logoGlow 1.5s ease-in-out infinite alternate;margin-bottom:6px}
.vrr-logo span{color:#9B59B6}
@keyframes logoGlow{from{text-shadow:0 0 40px rgba(155,89,182,.6)}to{text-shadow:0 0 80px rgba(155,89,182,1),0 0 120px rgba(155,89,182,.4)}}
.vrr-sub{font-size:.75rem;letter-spacing:.3em;text-transform:uppercase;color:#9B59B6;margin-bottom:6px;text-align:center}
.vrr-rule{font-size:.9rem;color:#ffd35a;font-weight:900;letter-spacing:.2em;text-transform:uppercase;margin-bottom:16px;text-align:center}

.intro-demo{position:relative;width:180px;height:180px;margin-bottom:16px;flex-shrink:0}
.demo-ring{position:absolute;border-radius:50%;border:2px solid rgba(155,89,182,.5);top:50%;left:50%}
.demo-ring:nth-child(1){width:50px;height:50px;margin-left:-25px;margin-top:-25px;animation:ringExpand 2s ease-out infinite 0s}
.demo-ring:nth-child(2){width:90px;height:90px;margin-left:-45px;margin-top:-45px;animation:ringExpand 2s ease-out infinite .5s;border-color:rgba(155,89,182,.3)}
.demo-ring:nth-child(3){width:140px;height:140px;margin-left:-70px;margin-top:-70px;animation:ringExpand 2s ease-out infinite 1s;border-color:rgba(155,89,182,.15)}
.demo-ring:nth-child(4){width:180px;height:180px;margin-left:-90px;margin-top:-90px;animation:ringExpand 2s ease-out infinite 1.5s;border-color:rgba(155,89,182,.06)}
@keyframes ringExpand{0%{transform:scale(.3);opacity:1}100%{transform:scale(1);opacity:0}}
.demo-dot{position:absolute;top:50%;left:50%;margin-left:-22px;margin-top:-22px;width:44px;height:44px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#A873B8,#9B59B6);box-shadow:0 0 30px rgba(155,89,182,1);animation:dotShrink 2s ease-in-out infinite}
@keyframes dotShrink{0%{transform:scale(1)}45%{transform:scale(.1);opacity:.3}55%{transform:scale(1.3)}100%{transform:scale(1)}}

.speed-row{display:flex;gap:12px;margin-bottom:14px}
.speed-btn{width:130px;height:64px;border:3px solid rgba(155,89,182,.4);background:rgba(155,89,182,.08);border-radius:18px;color:#fff;font-size:1.1rem;font-weight:900;cursor:pointer;text-transform:uppercase;letter-spacing:.1em}
.speed-btn.active{border-color:#9B59B6;background:rgba(155,89,182,.22);box-shadow:0 0 30px rgba(155,89,182,.6);color:#9B59B6}
.speed-btn small{display:block;font-size:.7rem;color:#a7adba;letter-spacing:.1em}
.big-btn{width:420px;height:80px;border:none;border-radius:24px;background:linear-gradient(135deg,#9B59B6,#A873B8);color:#fff;font-size:1.6rem;font-weight:900;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;box-shadow:0 0 40px rgba(155,89,182,.7);margin-bottom:14px;animation:btnPulse 2s ease-in-out infinite}
@keyframes btnPulse{0%,100%{box-shadow:0 0 40px rgba(155,89,182,.7)}50%{box-shadow:0 0 80px rgba(155,89,182,1)}}
.intro-info{font-size:.75rem;color:#8892a0;letter-spacing:.1em;text-transform:uppercase;text-align:center;line-height:1.8}
.intro-info strong{color:#ffd35a}

#screen-game{background:radial-gradient(ellipse at center,#0e0018 0%,#000 70%);justify-content:space-between;padding:12px 16px}
.topbar{width:100%;display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr 1fr;gap:10px;flex-shrink:0}
.top-box{display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;padding:4px 6px;background:rgba(0,0,0,.4);border:2px solid rgba(155,89,182,.3)}
.top-label{font-size:.5rem;color:#9B59B6;font-weight:900;letter-spacing:.1em;text-transform:uppercase;margin-bottom:1px}
.top-val{font-size:1.3rem;font-weight:900;line-height:1;color:#fff}
.clockbar{height:6px;background:rgba(255,255,255,.08);flex-shrink:0;overflow:hidden}
.clockbar-fill{height:100%;background:linear-gradient(90deg,#9B59B6,#A873B8);transition:width .05s linear}
.msg-bar{text-align:center;font-size:1.1rem;font-weight:900;letter-spacing:.12em;text-transform:uppercase;min-height:28px;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0 10px}
.msg-bar.watch{color:#9B59B6}.msg-bar.go{color:#ffd35a}.msg-bar.perfect{color:#00D9A5}.msg-bar.miss{color:#FF1493}
.stars{display:flex;gap:8px;justify-content:center;align-items:center;flex-shrink:0;padding:2px 0}
.star{font-size:1rem;opacity:.2;transition:all .3s}
.star.earned{opacity:1;filter:drop-shadow(0 0 6px #9B59B6);transform:scale(1.2)}
.court-area{flex:1;display:flex;align-items:center;justify-content:center;padding:8px;min-height:0}
.court{width:100%;height:100%;position:relative;border-radius:20px;background:radial-gradient(ellipse at center,#0e0018 0%,#000 80%);border:1px solid rgba(155,89,182,.2);overflow:hidden}
.target-dot{position:absolute;border-radius:50%;cursor:pointer;transform:translate(-50%,-50%)}
.target-dot.hit{background:radial-gradient(circle at 35% 35%,#00D9A5,#00B894)!important;box-shadow:0 0 60px rgba(0,217,165,1)!important}
.target-dot.missed{background:radial-gradient(circle at 35% 35%,#FF1493,#cc0066)!important;box-shadow:0 0 40px rgba(255,20,147,.8)!important}
.bottombar{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;padding:4px 10px 6px;gap:8px;flex-shrink:0}
.bot-btn{height:48px;border:2px solid rgba(155,89,182,.5);background:rgba(0,0,0,.4);border-radius:12px;color:#fff;font-size:1rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase;cursor:pointer}
.bot-btn span{display:block;color:#9B59B6;font-size:.55rem;margin-top:1px}
.start-btn{border-color:#9B59B6;background:linear-gradient(180deg,#A873B8,#9B59B6);font-size:1.1rem;box-shadow:0 0 18px rgba(155,89,182,.7)}
.start-btn:disabled{opacity:.5}
</style>
</head>
<body>

<div class="screen active" id="screen-intro">
  <a class="back-home" href="/vr-home.html">← Games</a>
  <div class="vrr-logo">REACTION <span>CONTROL</span></div>
  <div class="vrr-sub">VR Court · Reactific™</div>
  <div class="vrr-rule">⚡ TAP IT BEFORE IT VANISHES</div>
  <div class="intro-demo">
    <div class="demo-ring"></div>
    <div class="demo-ring"></div>
    <div class="demo-ring"></div>
    <div class="demo-ring"></div>
    <div class="demo-dot"></div>
  </div>
  <div class="speed-row">
    <button class="speed-btn active" data-time="3000">SLOW<small>3 SEC</small></button>
    <button class="speed-btn" data-time="2000">TEMPO<small>2 SEC</small></button>
    <button class="speed-btn" data-time="1500">ELITE<small>1.5 SEC</small></button>
  </div>
  <button class="big-btn" id="startBtn">⚡ ENTER THE COURT</button>
  <div class="intro-info">
    <strong>CIRCLE APPEARS</strong> — then starts shrinking<br>
    <strong>TAP IT</strong> — before it vanishes completely<br>
    <strong>EVERY HIT</strong> — gets faster and smaller<br>
    <strong>DECOYS APPEAR</strong> — tap only the purple
  </div>
</div>

<div class="screen" id="screen-game">
  <div class="topbar">
    <div class="top-box"><div class="top-label">Score</div><div class="top-val" id="hSc">0</div></div>
    <div class="top-box"><div class="top-label">Hits</div><div class="top-val" id="hHits">0</div></div>
    <div class="top-box"><div class="top-label">Best</div><div class="top-val" id="hBest">0</div></div>
    <div class="top-box"><div class="top-label">Level</div><div class="top-val" id="hLv">1</div></div>
    <div class="top-box"><div class="top-label">Streak</div><div class="top-val" id="hSt">0</div></div>
    <div class="top-box"><div class="top-label">Window</div><div class="top-val" id="hSpd">3.0s</div></div>
  </div>
  <div class="clockbar"><div class="clockbar-fill" id="clockFill" style="width:100%"></div></div>
  <div class="msg-bar watch" id="msg">TAP LET'S GO!</div>
  <div class="stars">
    <span class="star" id="ps1">⭐</span>
    <span class="star" id="ps2">⭐</span>
    <span class="star" id="ps3">⭐</span>
  </div>
  <div class="court-area">
    <div class="court" id="court"></div>
  </div>
  <div class="bottombar">
    <button class="bot-btn" id="menuBtn">← Home<span>Settings</span></button>
    <button class="bot-btn start-btn" id="actBtn">LET'S GO</button>
    <button class="bot-btn" style="border-color:#ffd35a;color:#ffd35a" onclick="location.href='/vr-home.html'">⊞ Games<span style="display:block;color:#ffd35a;font-size:.55rem;margin-top:1px">All 6</span></button>
    <button class="bot-btn" id="fsBtn">Fullscreen<span>Toggle</span></button>
  </div>
</div>

<script>
(function(){
var $=id=>document.getElementById(id);
var baseTime=3000,best=0;

document.querySelectorAll('[data-time]').forEach(btn=>{btn.onclick=function(){baseTime=Number(btn.dataset.time);document.querySelectorAll('[data-time]').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}});

$('startBtn').onclick=function(){$('screen-intro').classList.remove('active');$('screen-game').classList.add('active');initGame()};
$('menuBtn').onclick=function(){stopSession();$('screen-game').classList.remove('active');$('screen-intro').classList.add('active')};
$('fsBtn').onclick=async function(){try{if(!document.fullscreenElement)await document.documentElement.requestFullscreen();else await document.exitFullscreen()}catch(e){}};

var g={lv:1,sc:0,hits:0,st:0};
var phase='idle',shrinkRAF=null,timers=[],dot=null,dotSize=0,currentTime=0,decoys=[];

function clrT(){timers.forEach(clearTimeout);timers=[];if(shrinkRAF){cancelAnimationFrame(shrinkRAF);shrinkRAF=null}}
function getWindow(){return Math.max(600,baseTime-(g.hits*40))}
function getDotSize(){return Math.max(40,130-(g.lv-1)*10-Math.floor(g.hits/5)*3)}
function getDecoyCount(){if(g.lv<=3)return 0;if(g.lv<=6)return 1;if(g.lv<=9)return 2;return 3}
function updateHUD(){$('hSc').textContent=g.sc;$('hHits').textContent=g.hits;$('hBest').textContent=best;$('hLv').textContent=g.lv;$('hSt').textContent=g.st;$('hSpd').textContent=(getWindow()/1000).toFixed(1)+'s';for(var j=1;j<=3;j++)$('ps'+j).className='star'+(g.hits>=(j*10)?' earned':'')}
function msg(txt,cls){var el=$('msg');el.textContent=txt;el.className='msg-bar '+(cls||'watch')}
function randomPos(size){var c=$('court'),w=c.offsetWidth,h=c.offsetHeight,pad=size/2+10;return{x:pad+Math.random()*(w-pad*2),y:pad+Math.random()*(h-pad*2)}}

function initGame(){g={lv:1,sc:0,hits:0,st:0};updateHUD();msg("TAP LET'S GO!",'watch');$('actBtn').disabled=false;$('actBtn').onclick=startSession;$('clockFill').style.width='100%'}
function stopSession(){clrT();phase='idle';$('court').querySelectorAll('.target-dot,.decoy-dot').forEach(function(d){d.remove()})}

function startSession(){
  if(phase!=='idle')return;
  phase='playing';$('actBtn').disabled=true;
  msg('GET READY...','watch');
  timers.push(setTimeout(function(){
    var dc=getDecoyCount();
    msg(dc>0?'⚡ TAP PURPLE — IGNORE DECOYS!':'⚡ TAP BEFORE IT VANISHES!','go');
    timers.push(setTimeout(fireDot,400));
  },700));
}

function fireDot(){
  if(phase!=='playing')return;
  clrT();dotSize=getDotSize();currentTime=getWindow();
  $('court').querySelectorAll('.target-dot,.decoy-dot').forEach(function(d){d.remove()});
  decoys=[];
  var decoyCount=getDecoyCount();
  for(var d=0;d<decoyCount;d++){
    var dpos=randomPos(dotSize);
    var decoy=document.createElement('div');
    decoy.className='decoy-dot';
    decoy.style.cssText='position:absolute;border-radius:50%;cursor:pointer;transform:translate(-50%,-50%);width:'+dotSize+'px;height:'+dotSize+'px;left:'+dpos.x+'px;top:'+dpos.y+'px;background:radial-gradient(circle at 35% 35%,#334,#222);border:2px solid rgba(155,89,182,.3);box-shadow:0 0 10px rgba(100,100,150,.3)';
    decoy.onclick=onWrongTap;
    $('court').appendChild(decoy);
    decoys.push(decoy);
  }
  var pos=randomPos(dotSize);
  dot=document.createElement('div');
  dot.className='target-dot';
  dot.style.cssText='position:absolute;border-radius:50%;cursor:pointer;transform:translate(-50%,-50%);width:'+dotSize+'px;height:'+dotSize+'px;left:'+pos.x+'px;top:'+pos.y+'px;background:radial-gradient(circle at 35% 35%,#A873B8,#9B59B6);box-shadow:0 0 40px rgba(155,89,182,1),0 0 80px rgba(155,89,182,.4)';
  dot.onclick=handleTap;
  $('court').appendChild(dot);
  var startMs=performance.now();
  $('clockFill').style.width='100%';
  function shrink(){
    var elapsed=performance.now()-startMs;
    var pct=Math.max(0,1-(elapsed/currentTime));
    var curSize=dotSize*pct;
    decoys.forEach(function(d){d.style.width=curSize+'px';d.style.height=curSize+'px'});
    if(dot){
      dot.style.width=curSize+'px';dot.style.height=curSize+'px';
      if(pct<0.3){dot.style.background='radial-gradient(circle at 35% 35%,#FF1493,#9B59B6)';dot.style.boxShadow='0 0 40px rgba(255,20,147,.8)'}
      else if(pct<0.6){dot.style.background='radial-gradient(circle at 35% 35%,#ffd35a,#9B59B6)';dot.style.boxShadow='0 0 40px rgba(255,211,90,.8)'}
    }
    $('clockFill').style.width=(pct*100)+'%';
    if(pct<=0){onMiss('GONE!');return}
    if(phase==='playing')shrinkRAF=requestAnimationFrame(shrink);
  }
  shrinkRAF=requestAnimationFrame(shrink);
}

function handleTap(){
  if(phase!=='playing')return;clrT();
  if(dot){dot.classList.add('hit');dot.style.width=dotSize+'px';dot.style.height=dotSize+'px'}
  var pts=20+g.hits;g.sc+=pts;g.hits++;g.st++;
  if(g.hits>best)best=g.hits;
  if(g.hits%10===0&&g.lv<10)g.lv++;
  updateHUD();msg('⚡ '+g.hits+' HITS!',g.hits%10===0?'perfect':'go');
  timers.push(setTimeout(function(){if(phase==='playing')fireDot()},350));
}

function onWrongTap(){
  if(phase!=='playing')return;clrT();phase='idle';
  decoys.forEach(function(d){d.style.background='radial-gradient(circle at 35% 35%,#FF1493,#cc0066)';d.style.boxShadow='0 0 30px rgba(255,20,147,.8)'});
  if(g.hits>best)best=g.hits;g.st=0;updateHUD();
  msg('WRONG! '+g.hits+' HITS','miss');
  timers.push(setTimeout(function(){$('court').querySelectorAll('.target-dot,.decoy-dot').forEach(function(d){d.remove()});$('clockFill').style.width='100%';updateHUD();msg("TAP LET'S GO! BEST: "+best,'watch');$('actBtn').disabled=false},1500));
}

function onMiss(reason){
  if(phase!=='playing')return;phase='idle';clrT();
  if(dot){dot.classList.add('missed');dot.style.width=dotSize+'px';dot.style.height=dotSize+'px'}
  if(g.hits>best)best=g.hits;g.st=0;updateHUD();
  msg(reason+' '+g.hits+' HITS','miss');
  timers.push(setTimeout(function(){$('court').querySelectorAll('.target-dot,.decoy-dot').forEach(function(d){d.remove()});$('clockFill').style.width='100%';updateHUD();msg("TAP LET'S GO! BEST: "+best,'watch');$('actBtn').disabled=false},1500));
}

$('actBtn').onclick=startSession;
})();
</script>
</body>
</html>
