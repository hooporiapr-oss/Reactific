<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>VR Reaction Control | REACTIFIC™</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;
  background:#0a000f;
  font-family:Arial,sans-serif;
  color:#fff;overflow:hidden;
  user-select:none;-webkit-user-select:none;
}
.screen{display:none;width:100%;height:100vh;flex-direction:column;align-items:center;justify-content:center}
.screen.active{display:flex}

/* ── INTRO ── */
#screen-intro{
  background:radial-gradient(ellipse at 20% 20%,rgba(155,89,182,.18),transparent 40%),
             radial-gradient(ellipse at 80% 80%,rgba(155,89,182,.12),transparent 40%),
             linear-gradient(180deg,#0a000f,#05000a);
}
.vr-badge{
  display:inline-block;background:rgba(155,89,182,.15);
  border:1px solid rgba(155,89,182,.4);border-radius:999px;
  padding:5px 18px;font-size:.65rem;font-weight:900;
  letter-spacing:.25em;text-transform:uppercase;color:#9B59B6;margin-bottom:10px;
}
.vrr-logo{
  font-size:3.5rem;font-weight:900;font-style:italic;
  letter-spacing:.1em;text-transform:uppercase;
  color:#fff;text-align:center;line-height:1;
  text-shadow:0 0 60px rgba(155,89,182,1),0 0 120px rgba(155,89,182,.4);
  margin-bottom:6px;
}
.vrr-logo span{color:#9B59B6}
.vrr-sub{font-size:.9rem;letter-spacing:.25em;text-transform:uppercase;color:#9B59B6;margin-bottom:20px;text-align:center}

/* SELECTORS */
.sel-row{display:flex;gap:24px;margin-bottom:20px;align-items:flex-start;justify-content:center}
.sel-group{display:flex;flex-direction:column;align-items:center;gap:8px}
.sel-label{color:#FFD700;font-size:.72rem;font-weight:900;letter-spacing:.2em;text-transform:uppercase}
.sel-btns{display:flex;gap:8px}
.sel-btn{
  min-width:70px;height:58px;border:2px solid rgba(155,89,182,.35);
  background:rgba(155,89,182,.06);border-radius:12px;
  color:#fff;font-size:.85rem;font-weight:900;cursor:pointer;
  text-transform:uppercase;letter-spacing:.06em;
}
.sel-btn strong{display:block;font-size:1.2rem;line-height:1}
.sel-btn small{font-size:.55rem;color:#a7adba;letter-spacing:.1em}
.sel-btn.active{
  border-color:#9B59B6;background:rgba(155,89,182,.2);
  color:#9B59B6;box-shadow:0 0 20px rgba(155,89,182,.5);
}

/* SPEED */
.speed-row{display:flex;gap:12px;margin-bottom:20px}
.speed-btn{
  width:150px;height:72px;border:2px solid rgba(155,89,182,.35);
  background:rgba(155,89,182,.06);border-radius:16px;
  color:#fff;font-size:1.3rem;font-weight:900;
  cursor:pointer;text-transform:uppercase;letter-spacing:.1em;
}
.speed-btn small{display:block;font-size:.65rem;color:#a7adba;letter-spacing:.1em}
.speed-btn.active{
  border-color:#9B59B6;background:rgba(155,89,182,.18);
  box-shadow:0 0 24px rgba(155,89,182,.5);color:#9B59B6;
}
.big-btn{
  width:500px;height:110px;border:none;border-radius:24px;
  background:linear-gradient(135deg,#9B59B6,#A873B8);
  color:#fff;font-size:2rem;font-weight:900;
  letter-spacing:.15em;text-transform:uppercase;
  cursor:pointer;box-shadow:0 0 60px rgba(155,89,182,.8);margin-bottom:20px;
}
.big-btn:hover{transform:scale(1.03)}
.intro-info{font-size:.9rem;color:#8892a0;letter-spacing:.1em;text-transform:uppercase;text-align:center;line-height:2.2}
.intro-info strong{color:#FFD700}

/* ── PLAY ── */
#screen-play{
  background:radial-gradient(ellipse at center,#0e0018 0%,#05000a 70%);
  justify-content:space-between;
  padding:12px 16px;
}

/* TOPBAR */
.topbar{
  width:100%;display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:8px;flex-shrink:0;
}
.top-box{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-radius:12px;padding:8px;
  background:rgba(0,0,0,.4);border:2px solid rgba(155,89,182,.3);
}
.top-label{font-size:.6rem;color:#9B59B6;font-weight:900;letter-spacing:.14em;text-transform:uppercase;margin-bottom:2px}
.top-val{font-size:1.8rem;font-weight:900;line-height:1;color:#fff}
.lives-box .top-val{color:#FF1493;letter-spacing:4px;font-size:1.4rem}

/* MSG */
.msg{
  font-size:1.8rem;font-weight:900;letter-spacing:.15em;text-transform:uppercase;
  text-align:center;min-height:48px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.msg.watch{color:#9B59B6}
.msg.go{color:#FFD700}
.msg.perfect{color:#00D9A5}
.msg.miss{color:#FF1493}

/* STARS */
.stars{display:flex;gap:12px;align-items:center;justify-content:center;flex-shrink:0}
.star{font-size:1.5rem;opacity:.2;transition:all .3s}
.star.earned{opacity:1;filter:drop-shadow(0 0 8px #9B59B6);transform:scale(1.2)}

/* COURT */
.court-wrap{
  flex:1;display:flex;align-items:center;justify-content:center;
  width:100%;min-height:0;
}
.court{
  display:grid;
  grid-template-columns:repeat(10,1fr);
  grid-template-rows:repeat(5,1fr);
  gap:6px;
  width:100%;height:100%;max-height:100%;
  min-width:0;min-height:0;
  padding:10px;
  background:rgba(155,89,182,.04);
  border:2px solid rgba(155,89,182,.4);
  border-radius:20px;
  box-shadow:0 0 50px rgba(155,89,182,.15),inset 0 0 30px rgba(155,89,182,.05);
  flex-shrink:0;
}
.court.strobe-soft{filter:brightness(.62) contrast(1.08)}
.court.strobe-medium{filter:brightness(.42) contrast(1.15)}
.court.strobe-hard{opacity:.18}
.cell{
  border-radius:8px;
  background:rgba(155,89,182,.08);
  border:2px solid rgba(155,89,182,.45);
  cursor:pointer;transition:all .1s;
  min-height:0;min-width:0;overflow:hidden;
  box-shadow:inset 0 0 6px rgba(155,89,182,.06);
}
.cell:hover{background:rgba(155,89,182,.22);border-color:rgba(155,89,182,.9);box-shadow:0 0 12px rgba(155,89,182,.4)}
.cell.target{
  background:#9B59B6!important;border-color:#A873B8!important;
  box-shadow:0 0 30px rgba(155,89,182,1),0 0 60px rgba(155,89,182,.5)!important;
  transform:scale(1.06);
}
.cell.correct{
  background:#00D9A5!important;border-color:#00D9A5!important;
  box-shadow:0 0 20px rgba(0,217,165,.8)!important;
}
.cell.good-tap{background:#FF6B35!important;border-color:#FF6B35!important}
.cell.missed,.cell.wrong{
  background:rgba(255,20,147,.35)!important;border-color:#FF1493!important;
  animation:shake .3s;
}
@keyframes shake{25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* BOTTOM */
.bottombar{
  display:flex;justify-content:center;align-items:center;
  padding:8px 16px 10px;gap:16px;flex-shrink:0;
}
.bot-btn{
  height:62px;padding:0 28px;border:2px solid rgba(155,89,182,.4);
  background:rgba(0,0,0,.4);border-radius:14px;
  color:#fff;font-size:1rem;font-weight:900;
  letter-spacing:.08em;text-transform:uppercase;cursor:pointer;
}
.bot-btn span{display:block;color:#9B59B6;font-size:.6rem;margin-top:2px}
.start-btn{
  border-color:#9B59B6;
  background:linear-gradient(135deg,#9B59B6,#A873B8);
  font-size:1.3rem;padding:0 40px;
  box-shadow:0 0 24px rgba(155,89,182,.6);
}
.start-btn:disabled{opacity:.4}
</style>
</head>
<body>

<!-- INTRO -->
<div class="screen active" id="screen-intro">
  <div class="vr-badge">🥽 Virtual Reaction Reality™</div>
  <div class="vrr-logo">REACTION <span>CONTROL</span></div>
  <div class="vrr-sub">5×10 VR Court · Reactific™</div>

  <div class="speed-row">
    <button class="speed-btn" data-iv="1200">SLOW<small>50 BPM</small></button>
    <button class="speed-btn active" data-iv="1000">TEMPO<small>60 BPM</small></button>
    <button class="speed-btn" data-iv="850">ELITE<small>70 BPM</small></button>
  </div>

  <div class="sel-row">
    <div class="sel-group">
      <div class="sel-label">BPM</div>
      <div class="sel-btns">
        <button class="sel-btn" data-bpm="60"><strong>60</strong><small>BPM</small></button>
        <button class="sel-btn active" data-bpm="90"><strong>90</strong><small>BPM</small></button>
        <button class="sel-btn" data-bpm="120"><strong>120</strong><small>BPM</small></button>
      </div>
    </div>
    <div class="sel-group">
      <div class="sel-label">Strobe™</div>
      <div class="sel-btns">
        <button class="sel-btn" data-strobe="off"><strong>OFF</strong></button>
        <button class="sel-btn active" data-strobe="soft"><strong>SOFT</strong></button>
        <button class="sel-btn" data-strobe="medium"><strong>MED</strong></button>
        <button class="sel-btn" data-strobe="hard"><strong>HARD</strong></button>
      </div>
    </div>
  </div>

  <button class="big-btn" id="startBtn">⚡ ENTER THE COURT</button>
  <div class="intro-info">
    <strong>SEE</strong> — a cell lights up purple<br>
    <strong>POINT</strong> — controller at it<br>
    <strong>TRIGGER</strong> — before it disappears<br>
    <strong>3 WINS</strong> — level up
  </div>
</div>

<!-- PLAY -->
<div class="screen" id="screen-play">
  <div class="topbar">
    <div class="top-box"><div class="top-label">Score</div><div class="top-val" id="hSc">0</div></div>
    <div class="top-box"><div class="top-label">Round</div><div class="top-val" id="hRd">0</div></div>
    <div class="top-box"><div class="top-label">Level</div><div class="top-val" id="hLv">1</div></div>
    <div class="top-box"><div class="top-label">Streak</div><div class="top-val" id="hSt">0</div></div>
    <div class="top-box"><div class="top-label">Wins</div><div class="top-val" id="hCl">0/3</div></div>
    <div class="top-box lives-box"><div class="top-label">Lives</div><div class="top-val" id="hLiv">♥♥♥</div></div>
  </div>

  <div class="msg" id="msg">TAP LET'S GO!</div>

  <div class="stars">
    <span class="star" id="ps1">⭐</span>
    <span class="star" id="ps2">⭐</span>
    <span class="star" id="ps3">⭐</span>
  </div>

  <div class="court-wrap">
    <div class="court" id="court"></div>
  </div>

  <div class="bottombar">
    <button class="bot-btn" id="menuBtn">← Home<span>VR Menu</span></button>
    <button class="bot-btn start-btn" id="actBtn">LET'S GO</button>
    <button class="bot-btn" id="fsBtn">Fullscreen<span>Toggle</span></button>
  </div>
</div>

<script>
(function(){
var $=id=>document.getElementById(id);

/* ── SELECTORS ── */
var beatInterval=1000, bpm=90, strobe='soft', strobeTimer=null;

document.querySelectorAll('[data-iv]').forEach(btn=>{
  btn.onclick=function(){
    beatInterval=Number(btn.dataset.iv);
    document.querySelectorAll('[data-iv]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  };
});
document.querySelectorAll('[data-bpm]').forEach(btn=>{
  btn.onclick=function(){
    bpm=Number(btn.dataset.bpm);
    document.querySelectorAll('[data-bpm]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  };
});
document.querySelectorAll('[data-strobe]').forEach(btn=>{
  btn.onclick=function(){
    strobe=btn.dataset.strobe;
    document.querySelectorAll('[data-strobe]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  };
});

function stopStrobe(){
  if(strobeTimer){clearInterval(strobeTimer);strobeTimer=null;}
  var court=$('court');
  if(court)court.classList.remove('strobe-soft','strobe-medium','strobe-hard');
}
function startStrobe(){
  stopStrobe();if(strobe==='off')return;
  var court=$('court');
  var cls=strobe==='soft'?'strobe-soft':strobe==='medium'?'strobe-medium':'strobe-hard';
  var beat=60000/bpm;
  var flash=Math.max(80,Math.min(170,beat*.25));
  strobeTimer=setInterval(function(){
    court.classList.add(cls);
    setTimeout(function(){court.classList.remove(cls)},flash);
  },beat);
}

/* ── START ── */
$('startBtn').onclick=function(){
  $('screen-intro').classList.remove('active');
  $('screen-play').classList.add('active');
  buildCourt();initGame();startStrobe();
};

/* ── COURT ── */
var cells=[];
function buildCourt(){
  var court=$('court');court.innerHTML='';cells=[];
  for(var i=0;i<50;i++){
    var c=document.createElement('div');c.className='cell';c.dataset.i=i;
    c.onclick=(function(idx){return function(){handleTap(idx)}})(i);
    court.appendChild(c);cells.push(c);
  }
}

function cellSt(i,st){
  cells[i].className='cell';
  if(st)cells[i].classList.add(st);
}
function resetCells(){cells.forEach((_,i)=>cellSt(i))}

/* ── GAME ── */
var MAX_LIVES=3,PW=300,GW=600;
var g={lv:1,sc:0,rd:0,st:0,clears:0,lives:MAX_LIVES};
function gcc(){return Math.min(50,g.lv+2)}

function updateHUD(){
  $('hSc').textContent=g.sc;$('hRd').textContent=g.rd;
  $('hLv').textContent=g.lv;$('hSt').textContent=g.st;
  $('hCl').textContent=g.clears+'/3';
  var h='';for(var i=0;i<MAX_LIVES;i++)h+=i<g.lives?'♥':'♡';
  $('hLiv').textContent=h;
  $('hLiv').style.color=g.lives<=1?'#FF1493':'#9B59B6';
  for(var j=1;j<=3;j++)$('ps'+j).className='star'+(g.clears>=j?' earned':'');
}

function msg(txt,cls){var el=$('msg');el.textContent=txt;el.className='msg '+(cls||'')}

function initGame(){
  g={lv:1,sc:0,rd:0,st:0,clears:0,lives:MAX_LIVES};
  updateHUD();msg("TAP LET'S GO!",'');$('actBtn').disabled=false;
  $('actBtn').onclick=startRound;
}

var phase='idle',pattern=[],beatIndex=-1,currentTarget=-1,startTime=0,tapCount=0;
var timers=[],missTimer=null;
function clrT(){timers.forEach(clearTimeout);timers=[];if(missTimer){clearTimeout(missTimer);missTimer=null}}

function makePattern(){
  var len=gcc(),arr=[];
  while(arr.length<len){var n=Math.floor(Math.random()*50);if(arr.indexOf(n)===-1)arr.push(n)}
  return arr;
}

function startRound(){
  if(phase!=='idle')return;
  phase='playing';g.rd++;g.lives=MAX_LIVES;tapCount=0;
  pattern=makePattern();beatIndex=-1;currentTarget=-1;
  resetCells();$('actBtn').disabled=true;updateHUD();
  msg('GET READY...','watch');
  timers.push(setTimeout(function(){
    msg('⚡ SEE IT · TAP IT','go');
    timers.push(setTimeout(function(){fireBeat(0)},300));
  },700));
}

function fireBeat(i){
  if(phase!=='playing')return;
  clrT();beatIndex=i;currentTarget=pattern[i];startTime=performance.now();
  cells.forEach(function(c){c.classList.remove('target')});
  cellSt(currentTarget,'target');
  var iv=beatInterval;
  timers.push(setTimeout(function(){
    if(cells[currentTarget].classList.contains('target'))cellSt(currentTarget);
  },iv*.55));
  missTimer=setTimeout(function(){
    if(phase==='playing'&&currentTarget===pattern[i]){
      cellSt(currentTarget,'missed');
      endRound(false,'⏱ MISSED TARGET');
    }
  },iv*.9);
}

function nextBeat(){
  if(phase!=='playing')return;
  if(beatIndex<pattern.length-1){
    timers.push(setTimeout(function(){fireBeat(beatIndex+1)},180));
  }else{
    timers.push(setTimeout(function(){endRound(true)},250));
  }
}

function handleTap(idx){
  if(phase!=='playing'||currentTarget<0)return;
  if(missTimer){clearTimeout(missTimer);missTimer=null}
  var delta=performance.now()-startTime;
  if(idx!==currentTarget){
    cellSt(idx,'wrong');
    endRound(false,'❌ WRONG TAP');
    return;
  }
  var pts=delta<=PW?20:delta<=GW?12:5;
  var cls=delta<=PW?'correct':'good-tap';
  cellSt(idx,cls);
  tapCount++;g.sc+=pts;updateHUD();
  msg(delta<=PW?'✨ QUICK TAP!':'👍 GOOD TAP!',delta<=PW?'perfect':'go');
  nextBeat();
}

function endRound(won,reason){
  if(phase==='idle')return;
  phase='idle';clrT();currentTarget=-1;
  if(won){
    g.clears++;g.st++;updateHUD();
    msg('✅ ROUND CLEAR','perfect');
    if(g.clears>=3){
      timers.push(setTimeout(function(){
        if(g.lv<23){g.lv++;g.clears=0;}
        updateHUD();resetCells();
        msg('🔥 LEVEL UP! L'+g.lv,'perfect');
        timers.push(setTimeout(finishRound,900));
      },1000));
    }else{timers.push(setTimeout(finishRound,1000))}
  }else{
    g.clears=0;g.st=0;updateHUD();
    msg(reason||'ROUND FAILED','miss');
    timers.push(setTimeout(finishRound,1200));
  }
}

function finishRound(){
  phase='idle';g.lives=MAX_LIVES;tapCount=0;
  resetCells();updateHUD();
  msg("TAP LET'S GO!",'');$('actBtn').disabled=false;
}

/* ── BUTTONS ── */
$('menuBtn').onclick=function(){
  stopStrobe();
  $('screen-play').classList.remove('active');
  $('screen-intro').classList.add('active');
};
$('fsBtn').onclick=async function(){
  try{if(!document.fullscreenElement)await document.documentElement.requestFullscreen();
  else await document.exitFullscreen()}catch(e){}
};

buildCourt();
})();
</script>
</body>
</html>
