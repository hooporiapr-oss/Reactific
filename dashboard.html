<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Teacher Dashboard | Reactific™</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100%;font-family:'Segoe UI',Arial,sans-serif;
  background:radial-gradient(ellipse at 20% 10%,rgba(0,140,255,.12),transparent 50%),
             radial-gradient(ellipse at 80% 90%,rgba(155,89,182,.1),transparent 50%),
             linear-gradient(180deg,#050810,#020508);
  color:#fff}

.header{background:rgba(0,0,0,.5);border-bottom:1px solid rgba(255,255,255,.08);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.logo{font-size:1.4rem;font-weight:900;font-style:italic;letter-spacing:.08em;text-transform:uppercase;text-shadow:0 0 20px rgba(0,140,255,.5)}
.logo span{color:#008cff}
.header-right{display:flex;align-items:center;gap:10px}
.avatar{width:34px;height:34px;border-radius:50%;border:2px solid rgba(0,140,255,.4);background:linear-gradient(135deg,#008cff,#9B59B6);display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:900;flex-shrink:0}
.uname{font-size:.85rem;font-weight:600;color:#a7adba}
.signout{padding:6px 14px;border:1px solid rgba(255,255,255,.12);background:transparent;color:#8892a0;border-radius:8px;font-size:.75rem;cursor:pointer;transition:all .2s}
.signout:hover{border-color:rgba(255,255,255,.3);color:#fff}

.hero{padding:28px 20px 16px;text-align:center}
.welcome{font-size:1.8rem;font-weight:900;margin-bottom:8px}
.welcome span{color:#008cff}

.container{max-width:1200px;margin:0 auto;padding:20px}

.section{padding:20px 0;margin-bottom:20px}
.sec-title{font-size:.8rem;font-weight:900;letter-spacing:.25em;text-transform:uppercase;padding:0 4px;margin-bottom:12px;color:#008cff}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px;text-align:center}
.stat-value{font-size:2rem;font-weight:900;color:#008cff;line-height:1}
.stat-label{font-size:.7rem;color:#8892a0;letter-spacing:.12em;text-transform:uppercase;margin-top:6px}

.class-select{margin-bottom:16px}
.class-select select{padding:8px 12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#fff;font-size:.9rem;cursor:pointer}
.class-select select option{background:#0a0e1a;color:#fff}

.students-table{width:100%;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:14px;overflow:hidden}
.table-header{background:rgba(0,140,255,.1);padding:12px 16px;display:grid;grid-template-columns:2fr 1.5fr 1.5fr 1.5fr 1fr;gap:12px;font-size:.75rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,.05)}
.table-row{padding:12px 16px;display:grid;grid-template-columns:2fr 1.5fr 1.5fr 1.5fr 1fr;gap:12px;border-bottom:1px solid rgba(255,255,255,.05);align-items:center}
.table-row:last-child{border-bottom:none}
.table-row:hover{background:rgba(0,140,255,.05)}
.rank-badge{background:rgba(0,140,255,.2);padding:2px 6px;border-radius:4px;font-size:.7rem;font-weight:900;color:#008cff}
.student-name{font-size:.85rem;font-weight:600}
.score-val{font-size:.85rem;font-weight:900;color:#008cff}
.status-badge{font-size:.65rem;padding:2px 6px;border-radius:4px;text-align:center}
.status-active{background:rgba(76,175,80,.2);color:#4caf50}
.status-inactive{background:rgba(244,67,54,.2);color:#f44336}

.empty-state{text-align:center;padding:40px 20px;color:#3a4250}
.empty-icon{font-size:3rem;margin-bottom:10px}

.leaderboard{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:14px;overflow:hidden}
.lb-row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid rgba(255,255,255,.05)}
.lb-row:last-child{border-bottom:none}
.lb-rank{width:30px;font-size:.9rem;font-weight:900;color:#ffd35a;text-align:center;flex-shrink:0}
.lb-name{flex:1;font-size:.85rem;font-weight:600}
.lb-score{font-size:.85rem;font-weight:900;color:#008cff}

.btn{padding:8px 16px;background:rgba(0,140,255,.2);border:1px solid rgba(0,140,255,.4);color:#008cff;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn:hover{background:rgba(0,140,255,.3);border-color:rgba(0,140,255,.6)}

.back-btn{display:inline-block;margin-bottom:20px;padding:8px 16px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#fff;border-radius:8px;font-size:.8rem;text-decoration:none;cursor:pointer;transition:all .2s}
.back-btn:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.2)}
</style>
</head>
<body>

<div class="header">
  <div class="logo">REACTIFIC<span>™</span></div>
  <div class="header-right">
    <div class="avatar" id="avatarEl">?</div>
    <span class="uname" id="uname">Teacher</span>
    <button class="signout" onclick="signOut()">Sign Out</button>
  </div>
</div>

<div class="hero">
  <div class="welcome">Welcome, <span id="heroName">Teacher</span></div>
</div>

<div class="container">
  
  <button class="back-btn" onclick="goBack()">← Back to Games</button>

  <div class="section">
    <div class="sec-title">📊 Dashboard</div>
    
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="totalStudents">—</div>
        <div class="stat-label">Students in Class</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="totalScores">—</div>
        <div class="stat-label">Total Scores Submitted</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="avgScore">—</div>
        <div class="stat-label">Class Average Score</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="topScore">—</div>
        <div class="stat-label">Highest Score Today</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="sec-title">👥 Class Students</div>
    
    <div class="class-select">
      <select id="classSelect" onchange="loadClassStudents()">
        <option value="">Loading classes...</option>
      </select>
    </div>

    <div id="studentsContainer">
      <div class="empty-state">
        <div class="empty-icon">📚</div>
        <p>Select a class to view students</p>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="sec-title">🏆 School-Wide Leaderboard</div>
    <div class="leaderboard" id="leaderboard">
      <div class="empty-state">
        <div class="empty-icon">📊</div>
        <p>Loading leaderboard...</p>
      </div>
    </div>
  </div>

</div>

<script>
var API='https://api.reactificgaming.com';
var token=localStorage.getItem('rct-token');
var user=JSON.parse(localStorage.getItem('rct-user')||'null');

// Check if logged in
if(!token || !user){
  window.location.href='/index.html';
  throw new Error('Not authenticated');
}

// Set UI
var name=(user&&user.username)||'Teacher';
document.getElementById('uname').textContent=name;
document.getElementById('heroName').textContent=name;
document.getElementById('avatarEl').textContent=name[0].toUpperCase();

// Load user's classes
function loadClasses(){
  fetch(API+'/api/classes/teaching',{
    headers:{'Authorization':'Bearer '+token}
  })
  .then(r=>r.json())
  .then(d=>{
    var select=document.getElementById('classSelect');
    if(!d || !d.length){
      select.innerHTML='<option value="">No classes assigned</option>';
      return;
    }
    select.innerHTML='<option value="">Select a class...</option>'+
      d.map(c=>'<option value="'+c.id+'">'+c.name+'</option>').join('');
  })
  .catch(err=>{
    console.error('Error loading classes:',err);
    document.getElementById('classSelect').innerHTML='<option value="">Error loading classes</option>';
  });
}

// Load class students and stats
function loadClassStudents(){
  var classId=document.getElementById('classSelect').value;
  if(!classId){
    document.getElementById('studentsContainer').innerHTML=
      '<div class="empty-state"><div class="empty-icon">📚</div><p>Select a class to view students</p></div>';
    return;
  }

  fetch(API+'/api/classes/'+classId+'/dashboard',{
    headers:{'Authorization':'Bearer '+token}
  })
  .then(r=>r.json())
  .then(d=>{
    // Update stats
    if(d.stats){
      document.getElementById('totalStudents').textContent=d.stats.total_students||'—';
      document.getElementById('totalScores').textContent=d.stats.total_scores||'—';
      document.getElementById('avgScore').textContent=
        d.stats.avg_score ? Math.round(d.stats.avg_score) : '—';
      document.getElementById('topScore').textContent=d.stats.top_score||'—';
    }

    // Display students table
    var container=document.getElementById('studentsContainer');
    if(!d.students || !d.students.length){
      container.innerHTML=
        '<div class="empty-state"><div class="empty-icon">👥</div><p>No students in this class yet</p></div>';
      return;
    }

    var html='<div class="students-table">'+
      '<div class="table-header">'+
      '<div>Student Name</div>'+
      '<div>Best Score</div>'+
      '<div>Games Played</div>'+
      '<div>Last Played</div>'+
      '<div>Status</div>'+
      '</div>';

    d.students.forEach(s=>{
      var lastPlayed=s.last_played ? new Date(s.last_played).toLocaleDateString() : '—';
      var status=s.games_played > 0 ? 
        '<span class="status-badge status-active">Active</span>' : 
        '<span class="status-badge status-inactive">No Activity</span>';
      
      html+='<div class="table-row">'+
        '<div class="student-name">'+s.username+'</div>'+
        '<div class="score-val">'+Math.round(s.best_score||0)+'</div>'+
        '<div>'+s.games_played+'</div>'+
        '<div>'+lastPlayed+'</div>'+
        '<div>'+status+'</div>'+
        '</div>';
    });
    html+='</div>';
    container.innerHTML=html;
  })
  .catch(err=>{
    console.error('Error loading class:',err);
    document.getElementById('studentsContainer').innerHTML=
      '<div class="empty-state"><div class="empty-icon">⚠️</div><p>Error loading class data</p></div>';
  });
}

// Load school-wide leaderboard
function loadLeaderboard(){
  fetch(API+'/api/leaderboard?limit=20')
  .then(r=>r.json())
  .then(d=>{
    var lb=document.getElementById('leaderboard');
    if(!d || !d.length){
      lb.innerHTML='<div class="empty-state"><div class="empty-icon">📊</div><p>No scores yet</p></div>';
      return;
    }

    var medals=['🥇','🥈','🥉'];
    var html=d.map((e,i)=>
      '<div class="lb-row">'+
      '<div class="lb-rank">'+(medals[i]||'#'+(i+1))+'</div>'+
      '<div class="lb-name">'+e.username+'</div>'+
      '<div class="lb-score">'+e.score+' pts</div>'+
      '</div>'
    ).join('');
    lb.innerHTML=html;
  })
  .catch(err=>{
    console.error('Error loading leaderboard:',err);
    document.getElementById('leaderboard').innerHTML=
      '<div class="empty-state"><div class="empty-icon">⚠️</div><p>Error loading leaderboard</p></div>';
  });
}

// Go back to game hub
function goBack(){
  window.location.href='/hub.html';
}

// Sign out
function signOut(){
  localStorage.removeItem('rct-token');
  localStorage.removeItem('rct-user');
  window.location.href='/index.html';
}

// Initialize on load
loadClasses();
loadLeaderboard();
</script>

</body>
</html>
