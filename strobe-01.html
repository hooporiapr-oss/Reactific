<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Shot-Clock Challenges™ | STROBE™</title>
<style>
:root{--black:#030303;--white:#f5f5f5;--muted:#8f8f9d;--line:rgba(255,255,255,.14);--lime:#39FF14;--lime2:#2bc10f;--gold:#FFD700;--cyan:#00bbf0;--red:#ff3b3b;--orange:#f28a1f;--pink:#FF1493}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100%;background:var(--black);color:var(--white);font-family:Arial,Helvetica,sans-serif;user-select:none;-webkit-user-select:none;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
body{overflow-x:hidden;background:radial-gradient(circle at 12% 8%,rgba(57,255,20,.13),transparent 28%),radial-gradient(circle at 88% 10%,rgba(0,187,240,.12),transparent 28%),radial-gradient(circle at 50% 105%,rgba(242,138,31,.11),transparent 38%),linear-gradient(180deg,#050505,#020202)}
.app{width:100%;min-height:100dvh;display:grid;grid-template-rows:auto auto auto 1fr auto;gap:clamp(10px,1.5vh,16px);padding:clamp(12px,2vw,24px)}
.top{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px}
.logo{font-weight:900;letter-spacing:.11em;text-transform:uppercase;font-size:clamp(1.25rem,2.8vw,3.2rem);line-height:1}
.logo span{color:var(--lime)}
.mode{justify-self:center;border:1px solid rgba(57,255,20,.36);background:rgba(57,255,20,.08);color:var(--lime);padding:9px 18px;border-radius:999px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;font-size:clamp(.62rem,1vw,.95rem);white-space:nowrap}
.full-btn{justify-self:end;border:1px solid rgba(0,187,240,.35);background:rgba(0,187,240,.08);color:var(--cyan);border-radius:999px;padding:10px 16px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;cursor:pointer}
.titlebar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:14px}
.stat{color:var(--muted);font-weight:900;letter-spacing:.1em;text-transform:uppercase;font-size:clamp(.68rem,1vw,.9rem)}
.stat b{color:var(--lime);font-size:1.25em}
.stat.right{text-align:right}
.target-card{justify-self:center;display:flex;align-items:center;gap:16px;border:1px solid rgba(255,215,0,.28);background:rgba(255,215,0,.06);border-radius:22px;padding:12px 20px;min-width:min(420px,92vw);justify-content:center}
.target-label{color:var(--gold);font-weight:900;letter-spacing:.14em;text-transform:uppercase;font-size:clamp(.72rem,1.1vw,.95rem)}
.target-num{color:var(--lime);font-weight:900;font-size:clamp(2.4rem,5vw,5rem);line-height:1;min-width:100px;text-align:center;text-shadow:0 0 24px rgba(57,255,20,.55)}
.settings{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:1180px;width:100%;margin:0 auto}
.setting{background:rgba(255,255,255,.045);border:1px solid var(--line);border-radius:18px;padding:10px}
.setting-title{color:var(--muted);font-weight:900;letter-spacing:.13em;text-transform:uppercase;font-size:.65rem;text-align:center;margin-bottom:8px}
.options{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.options.four{grid-template-columns:repeat(4,1fr)}
.option{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.055);color:var(--muted);border-radius:12px;padding:10px 8px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;min-height:42px;font-size:clamp(.62rem,.9vw,.82rem)}
.option.active{color:#001400;background:linear-gradient(135deg,var(--lime),var(--lime2));border-color:var(--lime);box-shadow:0 0 18px rgba(57,255,20,.22)}
.play-area{min-height:0;display:grid;grid-template-columns:minmax(180px,260px) 1fr minmax(180px,260px);align-items:center;gap:18px;max-width:1280px;width:100%;margin:0 auto}
.side{display:flex;flex-direction:column;gap:12px}
.panel{border:1px solid var(--line);background:rgba(255,255,255,.045);border-radius:20px;padding:16px}
.panel-title{color:var(--muted);font-size:.65rem;letter-spacing:.13em;text-transform:uppercase;font-weight:900;margin-bottom:8px}
.big-stat{font-size:clamp(1.8rem,3vw,3.1rem);color:var(--lime);font-weight:900;line-height:1}
.clock-panel{text-align:center}
.clock-ring{position:relative;width:min(220px,20vw);min-width:150px;aspect-ratio:1;margin:0 auto}
.clock-svg{width:100%;height:100%;transform:rotate(-90deg)}
.clock-track{fill:none;stroke:rgba(255,255,255,.08);stroke-width:8}
.clock-progress{fill:none;stroke:var(--lime);stroke-width:8;stroke-linecap:round;transition:stroke .2s}
.clock-progress.warn{stroke:var(--orange)}
.clock-progress.danger{stroke:var(--pink)}
.clock-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column}
.clock-num{font-size:clamp(2.2rem,4vw,4.6rem);font-weight:900;line-height:1}
.clock-caption{font-size:.62rem;color:var(--muted);letter-spacing:.14em;font-weight:900;text-transform:uppercase}
.message{text-align:center;min-height:34px;display:flex;align-items:center;justify-content:center;color:var(--gold);font-weight:900;letter-spacing:.12em;text-transform:uppercase;font-size:clamp(.8rem,1.2vw,1rem)}
.court-wrap{min-height:0;display:flex;align-items:center;justify-content:center}
.court{width:min(calc(100dvh - 365px),58vw);max-width:690px;min-width:360px;aspect-ratio:1;display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(5,1fr);gap:clamp(8px,1vw,13px);padding:clamp(12px,1.5vw,20px);background:rgba(255,255,255,.045);border:2px solid var(--line);border-radius:30px;box-shadow:0 0 70px rgba(0,0,0,.62);transition:filter .06s linear,opacity .06s linear,border-color .15s}
.court.strobe-soft{filter:brightness(.62) contrast(1.08)}
.court.strobe-medium{filter:brightness(.42) contrast(1.14)}
.court.strobe-hard{opacity:.18}
.court.success{border-color:var(--lime);box-shadow:0 0 42px rgba(57,255,20,.28)}
.cell{border:2px solid rgba(255,255,255,.14);background:rgba(255,255,255,.07);color:rgba(255,255,255,.82);border-radius:18px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:clamp(2.2rem,4.1vw,4.5rem);cursor:pointer;transition:transform .08s ease,background .12s,border-color .12s}
.cell:hover{border-color:rgba(57,255,20,.38)}
.cell:active{transform:scale(.94)}
.cell.hit{background:var(--lime);border-color:var(--lime);color:#001400;box-shadow:0 0 30px rgba(57,255,20,.7)}
.cell.wrong{background:rgba(255,59,59,.4);border-color:var(--red);color:#fff}
.bottom{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;max-width:1280px;width:100%;margin:0 auto}
.main-btn{border:none;background:linear-gradient(135deg,var(--lime),var(--lime2));color:#001400;border-radius:999px;padding:18px 42px;font-weight:900;letter-spacing:.16em;text-transform:uppercase;font-size:clamp(.95rem,1.3vw,1.2rem);cursor:pointer;box-shadow:0 0 34px rgba(57,255,20,.34)}
.main-btn:disabled{opacity:.7;cursor:not-allowed}
.mini-note{color:var(--muted);font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;font-weight:900}
.notice{position:fixed;left:50%;bottom:115px;transform:translateX(-50%) translateY(34px);opacity:0;z-index:5;background:linear-gradient(135deg,var(--lime),var(--lime2));color:#001400;border-radius:18px;padding:14px 24px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;transition:all .25s ease}
.notice.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:980px){body{overflow:auto}.app{min-height:100dvh;grid-template-rows:auto auto auto auto auto;padding:14px}.top,.titlebar,.bottom{grid-template-columns:1fr;text-align:center}.mode,.full-btn,.target-card,.stat.right{justify-self:center;text-align:center}.settings{grid-template-columns:1fr}.play-area{grid-template-columns:1fr}.side{display:grid;grid-template-columns:repeat(2,1fr)}.clock-panel{order:-1}.clock-ring{width:145px;min-width:145px}.court{width:min(92vw,70vh);min-width:0}.bottom{padding-bottom:10px}}
@media(max-width:520px){.logo{font-size:1.15rem}.target-card{min-width:0;width:100%}.target-num{font-size:3.1rem}.options,.options.four{grid-template-columns:repeat(2,1fr)}.side{grid-template-columns:1fr 1fr;gap:8px}.panel{padding:12px;border-radius:16px}.big-stat{font-size:1.65rem}.cell{border-radius:12px;font-size:clamp(1.55rem,9vw,2.4rem)}.court{gap:6px;padding:9px;border-radius:20px}.main-btn{width:100%;padding:16px 24px}}
</style>
</head>
<body>
<div class="app">
<header class="top">
<div class="logo">SHOT-CLOCK <span>CHALLENGES™</span></div>
<div class="mode">STROBE™ SYSTEM</div>
<button class="full-btn" id="fullBtn">Fullscreen</button>
</header>
<section class="titlebar">
<div class="stat">Score: <b id="score">0</b></div>
<div class="target-card"><div class="target-label">Find</div><div class="target-num" id="target">—</div></div>
<div class="stat right">Round: <b id="round">0</b></div>
</section>
<section class="settings">
<div class="setting"><div class="setting-title">Shot Clock</div><div class="options"><button class="option active" data-clock="7">7 sec</button><button class="option" data-clock="5">5 sec</button><button class="option" data-clock="3">3 sec</button></div></div>
<div class="setting"><div class="setting-title">Strobe BPM</div><div class="options"><button class="option active" data-bpm="60">60</button><button class="option" data-bpm="90">90</button><button class="option" data-bpm="120">120</button></div></div>
<div class="setting"><div class="setting-title">Strobe Intensity</div><div class="options four"><button class="option active" data-strobe="off">Off</button><button class="option" data-strobe="soft">Soft</button><button class="option" data-strobe="medium">Medium</button><button class="option" data-strobe="hard">Hard</button></div></div>
</section>
<main class="play-area">
<aside class="side">
<div class="panel"><div class="panel-title">Clock</div><div class="big-stat"><span id="clockStat">7</span>s</div></div>
<div class="panel"><div class="panel-title">BPM</div><div class="big-stat" id="bpmStat">60</div></div>
</aside>
<section>
<div class="message" id="message">Tap Start Round</div>
<div class="court-wrap"><div class="court" id="court"></div></div>
</section>
<aside class="side">
<div class="panel clock-panel"><div class="clock-ring"><svg class="clock-svg" viewBox="0 0 100 100"><circle class="clock-track" cx="50" cy="50" r="42"></circle><circle class="clock-progress" id="clockProgress" cx="50" cy="50" r="42" stroke-dasharray="263.89" stroke-dashoffset="0"></circle></svg><div class="clock-center"><div class="clock-num" id="clockNum">7.0</div><div class="clock-caption">Shot Clock</div></div></div></div>
<div class="panel"><div class="panel-title">Strobe</div><div class="big-stat" id="strobeStat">Off</div></div>
</aside>
</main>
<footer class="bottom">
<div class="mini-note">5×5 Court · 25 Zones</div>
<button class="main-btn" id="startBtn">Start Round</button>
<div class="mini-note" style="text-align:right">Classic · Strobe · Elite</div>
</footer>
</div>
<div class="notice" id="notice">Located</div>
<script>
(function(){
const court=document.getElementById('court'),startBtn=document.getElementById('startBtn'),fullBtn=document.getElementById('fullBtn'),targetEl=document.getElementById('target'),scoreEl=document.getElementById('score'),roundEl=document.getElementById('round'),messageEl=document.getElementById('message'),notice=document.getElementById('notice'),clockProgress=document.getElementById('clockProgress'),clockNum=document.getElementById('clockNum'),clockStat=document.getElementById('clockStat'),bpmStat=document.getElementById('bpmStat'),strobeStat=document.getElementById('strobeStat');
const CIRC=263.89;
let cells=[],targetNum=null,score=0,round=0,playing=false,duration=7,bpm=60,strobe='off',timeLeftMs=7000,timer=null,strobeTimer=null;
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}
function buildCourt(){court.innerHTML='';cells=[];const nums=shuffle(Array.from({length:25},(_,i)=>i+1));nums.forEach(n=>{const cell=document.createElement('div');cell.className='cell';cell.textContent=n;cell.dataset.num=n;cell.addEventListener('click',()=>tapCell(cell));court.appendChild(cell);cells.push(cell)})}
function updateStats(){clockStat.textContent=duration;bpmStat.textContent=bpm;strobeStat.textContent=strobe.charAt(0).toUpperCase()+strobe.slice(1);clockNum.textContent=duration.toFixed(1);clockProgress.style.strokeDashoffset='0';clockProgress.className='clock-progress'}
function setActive(selector,attr,value){document.querySelectorAll(selector).forEach(btn=>btn.classList.toggle('active',btn.dataset[attr]===String(value)))}
document.querySelectorAll('[data-clock]').forEach(btn=>btn.addEventListener('click',()=>{if(playing)return;duration=Number(btn.dataset.clock);setActive('[data-clock]','clock',duration);updateStats()}));
document.querySelectorAll('[data-bpm]').forEach(btn=>btn.addEventListener('click',()=>{bpm=Number(btn.dataset.bpm);setActive('[data-bpm]','bpm',bpm);updateStats();if(playing)startStrobe()}));
document.querySelectorAll('[data-strobe]').forEach(btn=>btn.addEventListener('click',()=>{strobe=btn.dataset.strobe;setActive('[data-strobe]','strobe',strobe);updateStats();if(playing)startStrobe()}));
function showNotice(msg){notice.textContent=msg;notice.classList.add('show');setTimeout(()=>notice.classList.remove('show'),900)}
function stopStrobe(){if(strobeTimer)clearInterval(strobeTimer);strobeTimer=null;court.classList.remove('strobe-soft','strobe-medium','strobe-hard')}
function startStrobe(){stopStrobe();if(strobe==='off')return;const cls=strobe==='soft'?'strobe-soft':strobe==='medium'?'strobe-medium':'strobe-hard';const beatMs=60000/bpm;const flashMs=Math.max(90,Math.min(180,beatMs*.25));strobeTimer=setInterval(()=>{court.classList.add(cls);setTimeout(()=>court.classList.remove(cls),flashMs)},beatMs)}
function startRound(){if(playing)return;playing=true;round++;roundEl.textContent=round;buildCourt();targetNum=Math.floor(Math.random()*25)+1;targetEl.textContent=targetNum;timeLeftMs=duration*1000;clockNum.textContent=duration.toFixed(1);clockProgress.style.strokeDashoffset='0';clockProgress.className='clock-progress';court.classList.remove('success');startBtn.disabled=true;startBtn.textContent='Playing';messageEl.textContent='Find The Target';startStrobe();timer=setInterval(()=>{timeLeftMs-=50;const pct=Math.max(0,timeLeftMs/(duration*1000));clockProgress.style.strokeDashoffset=CIRC*(1-pct);clockNum.textContent=Math.max(0,timeLeftMs/1000).toFixed(1);if(pct<.25)clockProgress.className='clock-progress danger';else if(pct<.5)clockProgress.className='clock-progress warn';else clockProgress.className='clock-progress';if(timeLeftMs<=0)failRound('Time')},50)}
function endRound(){playing=false;startBtn.disabled=false;startBtn.textContent='Start Round';if(timer)clearInterval(timer);timer=null;stopStrobe()}
function success(cell){cell.classList.add('hit');court.classList.add('success');const bonus=Math.floor(timeLeftMs/100);score+=10+bonus;scoreEl.textContent=score;messageEl.textContent='Located';showNotice('Located');endRound()}
function failRound(reason){messageEl.textContent=reason==='wrong'?'Wrong Tap':'Time';showNotice(messageEl.textContent);cells.forEach(cell=>{if(Number(cell.dataset.num)===targetNum)cell.classList.add('hit')});endRound()}
function tapCell(cell){if(!playing)return;const num=Number(cell.dataset.num);if(num===targetNum)success(cell);else{cell.classList.add('wrong');failRound('wrong')}}
fullBtn.addEventListener('click',()=>{const el=document.documentElement;if(el.requestFullscreen)el.requestFullscreen().catch(()=>{});else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen()});
startBtn.addEventListener('click',startRound);
buildCourt();updateStats();
})();
</script>
</body>
</html>
